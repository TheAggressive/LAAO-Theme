name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  THEME_SLUG: laao
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ============================================================================
  # Lint (runs on every push and PR)
  # ============================================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:js

      - name: Run Stylelint
        run: pnpm lint:css

  # ============================================================================
  # Build (only on release-worthy commits)
  # ============================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10

    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Check if commit triggers release
        id: check
        run: |
          LATEST_COMMIT=$(git log -1 --pretty=format:"%s")
          echo "Latest commit: $LATEST_COMMIT"

          if echo "$LATEST_COMMIT" | grep -qE '^(feat|fix|perf)!?:|^(feat|fix|perf).*BREAKING CHANGE'; then
            echo "Release-triggering commit detected"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "Non-release commit (docs/style/refactor/chore/etc)"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.should_release == 'true'
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        if: steps.check.outputs.should_release == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build assets
        if: steps.check.outputs.should_release == 'true'
        run: pnpm build

      - name: Upload build artifacts
        if: steps.check.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # ============================================================================
  # Release (only on master/main push with release-worthy commit)
  # ============================================================================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      success() &&
      needs.build.outputs.should_release == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name == 'push'
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: pnpm semantic-release

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()

    steps:
      - name: Check status
        run: |
          echo "## CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SHOULD_RELEASE="${{ needs.build.outputs.should_release }}"
          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "**Release-worthy commit detected** — Full pipeline executed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Non-release commit** — Only lint checks executed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (ESLint + Stylelint) | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | skipped (non-release commit) |" >> $GITHUB_STEP_SUMMARY
          fi
